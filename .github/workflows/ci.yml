name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Must match package.json "packageManager" exactly (action-setup v4)
          version: 9.15.9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Build static export
        run: pnpm run build
        env:
          NEXT_PUBLIC_SITE_ENV: production
